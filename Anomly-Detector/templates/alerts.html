{% extends "base.html" %}
{% block title %}Alerts — AnomalyGuard{% endblock %}
{% block header_title %}🔔 Alerts Feed{% endblock %}

{% block content %}
<div class="alerts-layout">
    <!-- Left: Alert List -->
    <div class="card alert-list-panel">
        <div class="card-header">
            <span class="card-title">Anomaly Alerts</span>
            <span class="badge danger" id="alert-total-count" style="font-size: 0.75rem;">0</span>
        </div>
        <div class="filter-tabs" style="padding: 12px 16px 0;">
            <button class="filter-tab active" data-severity="ALL" onclick="filterAlerts('ALL', this)">All</button>
            <button class="filter-tab" data-severity="HIGH" onclick="filterAlerts('HIGH', this)">🔴 High</button>
            <button class="filter-tab" data-severity="MEDIUM" onclick="filterAlerts('MEDIUM', this)">🟡 Medium</button>
            <button class="filter-tab" data-severity="LOW" onclick="filterAlerts('LOW', this)">🟢 Low</button>
        </div>
        <div id="alert-list" style="overflow-y: auto; max-height: calc(100vh - 260px);">
            <div class="empty-state" style="padding: 60px 20px;">
                <p>Loading alerts…</p>
            </div>
        </div>
    </div>

    <!-- Right: Incident Detail Panel -->
    <div class="card incident-panel">
        <div class="card-header">
            <span class="card-title">Incident Analysis</span>
            <button class="btn btn-sm btn-success" id="btn-acknowledge" onclick="acknowledgeSelected()" style="display: none;">
                ✓ Acknowledge
            </button>
        </div>
        <div class="card-body" id="incident-detail">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <p>Select an alert to view incident details</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allAlerts = [];
let selectedAlertId = null;
let currentFilter = 'ALL';

function filterAlerts(severity, btn) {
    currentFilter = severity;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    loadAlerts();
}

function loadAlerts() {
    fetch(`/api/alerts?limit=50&severity=${currentFilter}`)
        .then(r => r.json())
        .then(alerts => {
            allAlerts = alerts;
            document.getElementById('alert-total-count').textContent = alerts.length;
            renderAlertList(alerts);
        });
}

function renderAlertList(alerts) {
    const container = document.getElementById('alert-list');
    if (alerts.length === 0) {
        container.innerHTML = '<div class="empty-state" style="padding: 60px 20px;"><p>No alerts found</p></div>';
        return;
    }
    container.innerHTML = alerts.map(a => `
        <div class="alert-item ${selectedAlertId === a.id ? 'selected' : ''} ${a.acknowledged ? '' : 'new-alert-flash'}"
             onclick="selectAlert(${a.id})" id="alert-item-${a.id}">
            <div class="alert-severity-dot ${a.severity.toLowerCase()}"></div>
            <div class="alert-item-content">
                <div class="alert-item-title">Patient ${a.patient_id}</div>
                <div class="alert-item-meta">${a.timestamp}</div>
            </div>
            <div class="alert-item-score ${a.severity.toLowerCase()}">${a.anomaly_score}</div>
        </div>
    `).join('');
}

function selectAlert(id) {
    selectedAlertId = id;
    const alert = allAlerts.find(a => a.id === id);
    if (!alert) return;

    // Highlight selected
    document.querySelectorAll('.alert-item').forEach(el => el.classList.remove('selected'));
    const el = document.getElementById(`alert-item-${id}`);
    if (el) el.classList.add('selected');

    const panel = document.getElementById('incident-detail');
    const ackBtn = document.getElementById('btn-acknowledge');
    ackBtn.style.display = alert.acknowledged ? 'none' : 'inline-flex';

    panel.innerHTML = `
        <div class="incident-section animate-in">
            <div class="incident-section-title">Patient Information</div>
            <div class="model-output-grid">
                <div class="model-stat-item">
                    <div class="model-stat-label">Patient ID</div>
                    <div class="model-stat-value" style="color: var(--primary-light);">${alert.patient_id}</div>
                </div>
                <div class="model-stat-item">
                    <div class="model-stat-label">Severity</div>
                    <div class="model-stat-value"><span class="badge ${alert.severity.toLowerCase()}"><span class="badge-dot"></span>${alert.severity}</span></div>
                </div>
                <div class="model-stat-item">
                    <div class="model-stat-label">Anomaly Score</div>
                    <div class="model-stat-value" style="color: var(--${alert.severity.toLowerCase()});">${alert.anomaly_score}</div>
                </div>
                <div class="model-stat-item">
                    <div class="model-stat-label">Detected At</div>
                    <div class="model-stat-value" style="font-size: 0.85rem;">${alert.timestamp}</div>
                </div>
            </div>
        </div>

        <div class="incident-section animate-in">
            <div class="incident-section-title">Vital Signs at Detection</div>
            <div class="model-output-grid">
                <div class="model-stat-item">
                    <div class="model-stat-label">♥ Heart Rate</div>
                    <div class="model-stat-value">${alert.heart_rate}</div>
                </div>
                <div class="model-stat-item">
                    <div class="model-stat-label">🫁 SpO₂</div>
                    <div class="model-stat-value">${alert.spo2}</div>
                </div>
                <div class="model-stat-item">
                    <div class="model-stat-label">🌡 Temperature</div>
                    <div class="model-stat-value">${alert.temperature}</div>
                </div>
                <div class="model-stat-item">
                    <div class="model-stat-label">💉 Blood Pressure</div>
                    <div class="model-stat-value">${alert.bp}</div>
                </div>
            </div>
        </div>

        <div class="incident-section animate-in">
            <div class="incident-section-title">Model Analysis</div>
            <div class="model-output-grid">
                <div class="model-stat-item">
                    <div class="model-stat-label">Detection Model</div>
                    <div class="model-stat-value" style="font-size: 0.88rem;">Isolation Forest</div>
                </div>
                <div class="model-stat-item">
                    <div class="model-stat-label">Status</div>
                    <div class="model-stat-value" style="font-size: 0.88rem;">${alert.acknowledged ? '✅ Acknowledged' : '⚠️ Unacknowledged'}</div>
                </div>
            </div>
        </div>
    `;
}

function acknowledgeSelected() {
    if (!selectedAlertId) return;
    fetch(`/api/alerts/${selectedAlertId}/acknowledge`, { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                loadAlerts();
                selectAlert(selectedAlertId);
            }
        });
}

function onNewAlert(data) {
    loadAlerts();
}

loadAlerts();
</script>
{% endblock %}
